<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SNAKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFF9F5; /* 奶油白 */
            color: #6B5B73; /* 炭灰 */
            font-family: 'Orbitron', monospace;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            padding: 1rem;
        }

        /* Animated grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            background-image:
                linear-gradient(rgba(226, 240, 203, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 240, 203, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .game-container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 640px;
            margin: 2rem auto;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6B5B73; /* 炭灰 */
            text-shadow: 0 0 20px rgba(107, 91, 115, 0.3);
            animation: title-glow 2s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            padding: 1rem 2rem;
            border: 2px solid rgba(199, 206, 234, 0.7);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(199, 206, 234, 0.3);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            box-shadow: 0 0 30px rgba(199, 206, 234, 0.5);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #FF9AA2; /* 草莓粉 */
            text-shadow: 0 0 10px rgba(255, 154, 162, 0.3);
        }

        #gameCanvas {
            border: 3px solid #C7CEEA; /* 淡薰衣草色 */
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(199, 206, 234, 0.3);
            background: #FFF9F5; /* 奶油白 */
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }

        .game-controls {
            margin-top: 2rem;
            opacity: 0.6;
        }

        .game-controls p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Game over overlay */
        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFFAD1; /* 柔和的浅黄色背景 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay-content {
            text-align: center;
            padding: 3rem;
            border: 2px solid #F8B195;
            border-radius: 16px;
            background: rgba(248, 177, 149, 0.9); /* 桃色背景 */
            box-shadow: 0 0 60px rgba(248, 177, 149, 0.4);
            animation: glitch 0.3s;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .restart-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #FFB7B2, #FFDAC1);
            border: none;
            border-radius: 8px;
            color: #6B5B73;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 183, 178, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            pointer-events: none;
            animation: particle-fade 1.2s ease-out forwards;
            border-radius: 50%;
        }

        @keyframes particle-fade {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            to {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 2.5rem;
            }
            .game-stats {
                gap: 1rem;
            }
            .stat-box {
                padding: 0.8rem 1.5rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="game-container">
        <h1 class="game-title">Neon Snake</h1>

        <div class="game-stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="game-controls">
            <p>Use Arrow Keys or WASD to control</p>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="overlay-content">
            <h2 style="font-size: 3rem; margin-bottom: 1rem; color: #6B5B73; text-shadow: 0 0 20px rgba(107, 91, 115, 0.2);">GAME OVER</h2>
            <p style="font-size: 1.5rem; color: #6B5B73; margin-bottom: 2rem;">Final Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreElement = document.getElementById('finalScore');

        // Set responsive canvas size - ensure exact fit for 20x20 grid
        function setCanvasSize() {
            const maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 300, 600);
            // Round down to nearest multiple of 20 for perfect grid alignment
            const adjustedSize = Math.floor(maxSize / 20) * 20;
            canvas.width = adjustedSize;
            canvas.height = adjustedSize;
        }

        setCanvasSize();
        window.addEventListener('resize', () => {
            setCanvasSize();
            draw();
        });

        // Game settings - CORRECT GRID CALCULATION
        function getGameSettings() {
            const tileCount = 20; // Fixed 20x20 grid
            const gridSize = Math.floor(canvas.width / tileCount); // Integer size for each cell
            return { gridSize, tileCount };
        }

        // Fruit types with different point values
        const fruitTypes = [
            { emoji: '🍒', points: 1, color: '#ff0066' },     // Cherry
            { emoji: '🍓', points: 2, color: '#ff3300' },     // Strawberry
            { emoji: '🍊', points: 3, color: '#ff6600' },     // Orange
            { emoji: '🥝', points: 4, color: '#66ff00' },     // Kiwi
            { emoji: '🍇', points: 5, color: '#9900ff' },     // Grapes
            { emoji: '🍉', points: 6, color: '#00ff99' },     // Watermelon
            { emoji: '🍑', points: 7, color: '#ffcc00' },     // Peach
            { emoji: '🥭', points: 8, color: '#ffcc00' },     // Mango
            { emoji: '🍍', points: 9, color: '#ffff00' },     // Pineapple
            { emoji: '🥥', points: 10, color: '#8b4513' }     // Coconut
        ];

        let snake = [
            {x: 10, y: 10, fruit: null} // Starting position - center of 20x20 grid
        ];
        let direction = {x: 0, y: 0};
        let foods = []; // Multiple foods array
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        const FOOD_COUNT = 5; // Number of foods on screen at once

        // Initialize
        highScoreElement.textContent = highScore;
        generateFood();

        // Debug: Log initial state
        console.log('Game initialized', {
            canvasSize: canvas.width,
            gridSize: getGameSettings().gridSize,
            tileCount: getGameSettings().tileCount,
            snakeStart: snake[0]
        });

        // Immediately draw once to verify visibility
        draw();

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            setTimeout(gameLoop, 150); // Slower speed (was 100ms)
        }

        function update() {
            const { tileCount } = getGameSettings();

            // If no direction set, don't move
            if (direction.x === 0 && direction.y === 0) {
                return;
            }

            // Move snake head
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check boundaries
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision (skip the head itself)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // Standard snake movement: unshift new head
            snake.unshift({...head, fruit: null});

            // Check food collision with all foods
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    // Add points based on fruit type
                    score += foods[i].points;
                    updateScore();
                    createParticles(foods[i]); // Pass the specific food

                    // Set the fruit at the head (where it was eaten)
                    snake[0].fruit = foods[i];

                    // Remove eaten food
                    foods.splice(i, 1);

                    foodEaten = true;
                    break;
                }
            }

            if (!foodEaten) {
                // Remove tail segment
                snake.pop();
            } else {
                // Generate a new food if we're below the target count
                if (foods.length < FOOD_COUNT) {
                    const { tileCount } = getGameSettings();
                    const randomFruit = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                    let newFood = {
                        x: Math.floor(Math.random() * tileCount),
                        y: Math.floor(Math.random() * tileCount),
                        ...randomFruit
                    };

                    // Ensure new food doesn't spawn on snake or other foods
                    let validPosition = true;
                    for (let segment of snake) {
                        if (segment.x === newFood.x && segment.y === newFood.y) {
                            validPosition = false;
                            break;
                        }
                    }

                    if (validPosition) {
                        for (let existingFood of foods) {
                            if (existingFood.x === newFood.x && existingFood.y === newFood.y) {
                                validPosition = false;
                                break;
                            }
                        }
                    }

                    if (validPosition) {
                        foods.push(newFood);
                    }
                }
            }

            // Shift fruits through the snake body (move them backward/toward tail)
            for (let i = snake.length - 1; i > 0; i--) {
                snake[i].fruit = snake[i - 1].fruit;
            }
            snake[0].fruit = null;
        }

        function draw() {
            const { gridSize, tileCount } = getGameSettings();

            // 奶油白背景
            ctx.fillStyle = '#FFF9F5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制subtle网格 - 淡薰衣草色
            ctx.strokeStyle = '#C7CEEA'; /* 淡薰衣草色 */
            ctx.lineWidth = 1;
            ctx.fillStyle = '#FFF9F5';

            for (let y = 0; y < tileCount; y++) {
                for (let x = 0; x < tileCount; x++) {
                    const xPos = x * gridSize;
                    const yPos = y * gridSize;

                    // Fill cell background
                    ctx.fillRect(xPos, yPos, gridSize, gridSize);

                    // Draw cell border
                    ctx.strokeRect(xPos, yPos, gridSize, gridSize);
                }
            }

            console.log('Drawing snake, segments:', snake.length);

            // 马卡龙色系数组 - 蛇身分段不同颜色
            const macaronColors = [
                '#FFB7B2', /* 蜜桃粉 */
                '#FFDAC1', /* 奶油杏 */
                '#E2F0CB', /* 薄荷绿 */
                '#C7CEEA', /* 薰衣草紫 */
                '#F8B195', /* 珊瑚橘 */
                '#B5EAD7', /* 冰蓝绿 */
                '#FF9AA2', /* 草莓粉 */
                '#C7A2C7'  /* 紫罗兰 */
            ];

            // Draw snake with macaron colors
            snake.forEach((segment, index) => {
                console.log(`Drawing segment ${index} at`, segment);

                // 蛇头 - 草莓粉
                if (index === 0) {
                    ctx.fillStyle = '#FF9AA2';
                } else {
                    // 蛇身 - 马卡龙色系，每段不同颜色
                    ctx.fillStyle = macaronColors[index % macaronColors.length];
                }

                // 绘制蛇身方块
                ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);

                // Subtle border
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);

                // Add fruit if present - emoji on background
                if (segment.fruit && segment.fruit.emoji) {
                    // Draw white background for fruit
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);

                    // Draw fruit emoji
                    ctx.font = `${gridSize * 0.7}px Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#000000';
                    ctx.fillText(segment.fruit.emoji, segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2);
                }
            });

            // Draw all foods with fruit emoji - on cream background
            foods.forEach(food => {
                if (food.emoji) {
                    // Draw cream background for fruit emoji
                    ctx.fillStyle = '#FFF9F5';
                    ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

                    // Draw fruit emoji
                    ctx.font = `${gridSize * 0.8}px Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#6B5B73'; /* 炭灰 */
                    ctx.fillText(food.emoji, food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2);

                    // Draw point value
                    if (food.points > 1) {
                        ctx.font = `${Math.min(gridSize * 0.3, 14)}px Orbitron, monospace`;
                        ctx.fillStyle = '#6B5B73'; /* 炭灰 */
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillText(food.points + 'pts', food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize - 3);
                    }
                }
            });
        }

        function generateFood() {
            const { tileCount } = getGameSettings();

            // Clear existing foods
            foods = [];

            // Generate multiple foods
            for (let i = 0; i < FOOD_COUNT; i++) {
                const randomFruit = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                let newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    ...randomFruit
                };

                // Ensure food doesn't spawn on snake or other foods
                let validPosition = true;

                // Check against snake
                for (let segment of snake) {
                    if (segment.x === newFood.x && segment.y === newFood.y) {
                        validPosition = false;
                        break;
                    }
                }

                // Check against other foods
                if (validPosition) {
                    for (let existingFood of foods) {
                        if (existingFood.x === newFood.x && existingFood.y === newFood.y) {
                            validPosition = false;
                            break;
                        }
                    }
                }

                if (validPosition) {
                    foods.push(newFood);
                } else {
                    // Try again for this food
                    i--;
                }
            }
        }

        function updateScore() {
            scoreElement.textContent = score;

            // Animate score update
            scoreElement.style.transform = 'scale(1.2)';
            scoreElement.style.color = '#C7CEEA'; /* 淡薰衣草色 */
            setTimeout(() => {
                scoreElement.style.transform = 'scale(1)';
                scoreElement.style.color = '#FF9AA2'; /* 草莓粉 */
            }, 200);

            // Update high score
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverlay.style.display = 'flex';
        }

        function restartGame() {
            setCanvasSize(); // Recalculate canvas size on restart
            snake = [{x: 10, y: 10, fruit: null}];
            direction = {x: 0, y: 0};
            score = 0;
            updateScore();
            gameRunning = true;
            generateFood();
            gameOverlay.style.display = 'none';
            draw(); // Redraw initial state
            gameLoop(); // Start game loop again
        }

        // Firework types
        function createExplosionFirework(x, y, color, particleCount = 30) {
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;

                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 80 + Math.random() * 60;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.boxShadow = `0 0 10px ${color}`;
                particle.style.width = '6px';
                particle.style.height = '6px';

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        function createRingFirework(x, y, color, rings = 3) {
            for (let ring = 0; ring < rings; ring++) {
                const particleCount = 20;
                const radius = 60 + ring * 40;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = (4 - ring) + 'px';
                    particle.style.height = (4 - ring) + 'px';

                    const angle = (Math.PI * 2 * i) / particleCount;
                    const tx = Math.cos(angle) * radius;
                    const ty = Math.sin(angle) * radius;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 8px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }

        function createSpiralFirework(x, y, color, arms = 4) {
            for (let arm = 0; arm < arms; arm++) {
                const particlesPerArm = 10;
                const baseAngle = (Math.PI * 2 * arm) / arms;

                for (let i = 0; i < particlesPerArm; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = '5px';
                    particle.style.height = '5px';

                    const progress = i / particlesPerArm;
                    const angle = baseAngle + progress * Math.PI * 4;
                    const velocity = 50 + progress * 80;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 10px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }

        function createStarFirework(x, y, color) {
            const starPoints = 8;
            const particleCount = starPoints * 4;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;
                particle.style.width = '7px';
                particle.style.height = '7px';

                const point = Math.floor(i / 4);
                const position = i % 4;
                const angle = (Math.PI * 2 * point) / starPoints;
                const velocity = 40 + position * 30;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.boxShadow = `0 0 12px ${color}`;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        function createWaterfallFirework(x, y, color) {
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = '4px';
                    particle.style.height = '4px';

                    const angle = (Math.random() - 0.5) * Math.PI / 2;
                    const velocity = 50 + Math.random() * 60;
                    const gravity = -Math.random() * 30;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity + gravity;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 8px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1500);
                }, i * 20);
            }
        }

        function createParticles(eatenFood) {
            const { gridSize } = getGameSettings();
            const foodPos = {
                x: eatenFood.x * gridSize + gridSize / 2,
                y: eatenFood.y * gridSize + gridSize / 2
            };

            // Select a random firework type based on fruit points
            const fireworkTypes = ['explosion', 'ring', 'spiral', 'star', 'waterfall'];
            const chosenType = fireworkTypes[Math.floor(Math.random() * fireworkTypes.length)];

            // Different particle counts based on fruit value
            let particleMultiplier = 1;
            if (eatenFood.points >= 8) particleMultiplier = 2;
            else if (eatenFood.points >= 5) particleMultiplier = 1.5;

            // Create canvas glow effect first
            ctx.save();
            ctx.globalAlpha = 0.2;

            // Create radial gradient for fruit glow
            const gradient = ctx.createRadialGradient(
                eatenFood.x * gridSize + gridSize/2,
                eatenFood.y * gridSize + gridSize/2,
                0,
                eatenFood.x * gridSize + gridSize/2,
                eatenFood.y * gridSize + gridSize/2,
                gridSize * 3
            );
            gradient.addColorStop(0, eatenFood.color || '#FFB7B2');
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.fillRect(eatenFood.x * gridSize - gridSize * 2, eatenFood.y * gridSize - gridSize * 2, gridSize * 5, gridSize * 5);
            ctx.restore();

            // Execute chosen firework type
            switch(chosenType) {
                case 'explosion':
                    createExplosionFirework(foodPos.x, foodPos.y, eatenFood.color || '#FFB7B2', Math.floor(30 * particleMultiplier));
                    break;
                case 'ring':
                    createRingFirework(foodPos.x, foodPos.y, eatenFood.color || '#FFDAC1', 2 + Math.floor(particleMultiplier));
                    break;
                case 'spiral':
                    createSpiralFirework(foodPos.x, foodPos.y, eatenFood.color || '#E2F0CB', Math.floor(3 * particleMultiplier));
                    break;
                case 'star':
                    createStarFirework(foodPos.x, foodPos.y, eatenFood.color || '#C7CEEA');
                    break;
                case 'waterfall':
                    createWaterfallFirework(foodPos.x, foodPos.y, eatenFood.color || '#FF9AA2');
                    break;
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && e.key !== 'Enter' && e.key !== ' ') return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) {
                        direction = {x: 0, y: -1};
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) {
                        direction = {x: 0, y: 1};
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) {
                        direction = {x: -1, y: 0};
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) {
                        direction = {x: 1, y: 0};
                    }
                    break;
                case 'Enter':
                case ' ':
                    if (!gameRunning) {
                        restartGame();
                    }
                    break;
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                if (dx > 0 && direction.x === 0) {
                    direction = {x: 1, y: 0};
                } else if (dx < 0 && direction.x === 0) {
                    direction = {x: -1, y: 0};
                }
            } else {
                // Vertical swipe
                if (dy > 0 && direction.y === 0) {
                    direction = {x: 0, y: 1};
                } else if (dy < 0 && direction.y === 0) {
                    direction = {x: 0, y: -1};
                }
            }
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
