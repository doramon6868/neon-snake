<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SNAKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFF9F5; /* 奶油白 */
            color: #6B5B73; /* 炭灰 */
            font-family: 'Orbitron', monospace;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            padding: 1rem;
        }

        /* Animated grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            background-image:
                linear-gradient(rgba(226, 240, 203, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 240, 203, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .game-container {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 640px;
            margin: 2rem auto;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6B5B73; /* 炭灰 */
            text-shadow: 0 0 20px rgba(107, 91, 115, 0.3);
            animation: title-glow 2s ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            padding: 1rem 2rem;
            border: 2px solid rgba(199, 206, 234, 0.7);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(199, 206, 234, 0.3);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            box-shadow: 0 0 30px rgba(199, 206, 234, 0.5);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #FF9AA2; /* 草莓粉 */
            text-shadow: 0 0 10px rgba(255, 154, 162, 0.3);
        }

        /* AI 得分框特殊样式 */
        .ai-score-box .stat-value {
            color: #6BB6FF;  /* 浅蓝色 */
            text-shadow: 0 0 10px rgba(107, 182, 255, 0.3);
        }

        /* 玩家得分框特殊样式 */
        .player-score-box .stat-value {
            color: #FF9AA2;  /* 草莓粉 */
            text-shadow: 0 0 10px rgba(255, 154, 162, 0.3);
        }

        /* VS 标识样式 */
        .vs-box .stat-value {
            color: #C7CEEA;  /* 淡薰衣草色 */
            font-size: 1.5rem;
        }

        #gameCanvas {
            border: 3px solid #C7CEEA; /* 淡薰衣草色 */
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(199, 206, 234, 0.3);
            background: #FFF9F5; /* 奶油白 */
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100%;
        }

        .game-controls {
            margin-top: 2rem;
            opacity: 0.6;
        }

        .game-controls p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Game over overlay */
        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FFFAD1; /* 柔和的浅黄色背景 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .overlay-content {
            text-align: center;
            padding: 3rem;
            border: 2px solid #F8B195;
            border-radius: 16px;
            background: rgba(248, 177, 149, 0.9); /* 桃色背景 */
            box-shadow: 0 0 60px rgba(248, 177, 149, 0.4);
            animation: glitch 0.3s;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .restart-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #FFB7B2, #FFDAC1);
            border: none;
            border-radius: 8px;
            color: #6B5B73;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 183, 178, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            pointer-events: none;
            animation: particle-fade 1.2s ease-out forwards;
            border-radius: 50%;
        }

        @keyframes particle-fade {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            to {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Menu background fruit animation */
        .menu-fruit {
            position: fixed;
            pointer-events: none;
            z-index: 250;
            animation: menu-fruit-float 3s ease-out forwards;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        @keyframes menu-fruit-float {
            0% {
                transform: translateY(0) translateX(0) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                transform: translateY(-30px) translateX(var(--drift)) scale(1) rotate(45deg);
                opacity: 1;
            }
            80% {
                transform: translateY(-180px) translateX(var(--drift)) scale(1) rotate(180deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-220px) translateX(calc(var(--drift) * 1.5)) scale(0.5) rotate(270deg);
                opacity: 0;
            }
        }

        /* Trophy animation */
        .trophy-container {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            animation: trophy-appear 2s ease-out forwards;
        }

        .trophy-emoji {
            font-size: 64px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            animation: trophy-glow 1s ease-in-out infinite alternate;
        }

        @keyframes trophy-appear {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            40% {
                transform: scale(1.2) rotate(10deg);
                opacity: 1;
            }
            60% {
                transform: scale(1) rotate(-5deg);
            }
            80% {
                transform: scale(1.05) rotate(3deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes trophy-glow {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(255, 215, 0, 1)) drop-shadow(0 0 60px rgba(255, 183, 178, 0.8));
            }
        }

        /* Flower spray animation */
        .flower-particle {
            position: fixed;
            pointer-events: none;
            z-index: 149;
            font-size: 20px;
            animation: flower-fly 1.5s ease-out forwards;
        }

        @keyframes flower-fly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.6) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* Menu overlay styles */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFF9F5 0%, #FFDAC1 50%, #FFB7B2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .menu-content {
            text-align: center;
            padding: 3rem;
            max-width: 800px;
            width: 90%;
        }

        .menu-title {
            font-size: 4rem;
            font-weight: 900;
            color: #6B5B73;
            text-shadow: 0 0 30px rgba(107, 91, 115, 0.3);
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
            animation: title-pulse 2s ease-in-out infinite;
        }

        @keyframes title-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .menu-subtitle {
            font-size: 1.5rem;
            color: #6B5B73;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .menu-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            width: 280px;
            height: 280px;
            border: none;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .mode-btn:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .mode-btn:active {
            transform: translateY(-5px) scale(0.98);
        }

        .challenge-btn {
            background: linear-gradient(135deg, #FFB7B2 0%, #FF9AA2 100%);
            border: 4px solid #fff;
        }

        .regular-btn {
            background: linear-gradient(135deg, #B5EAD7 0%, #C7CEEA 100%);
            border: 4px solid #fff;
        }

        .ai-btn {
            background: linear-gradient(135deg, #E2F0CB 0%, #B5EAD7 100%);
            border: 4px solid #fff;
        }

        .ai-btn .mode-icon {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .ai-vs-btn {
            background: linear-gradient(135deg, #FFDAC1 0%, #F8B195 100%);
            border: 4px solid #fff;
        }

        .ai-vs-btn .mode-icon {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .go-menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #FFB7B2, #FFDAC1);
            border: 2px solid #fff;
            border-radius: 25px;
            color: #6B5B73;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 150;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none;
        }

        .go-menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .go-menu-btn:active {
            transform: translateY(0);
        }

        .mode-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .mode-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #6B5B73;
            margin-bottom: 0.5rem;
            display: block;
        }

        .mode-desc {
            font-size: 0.9rem;
            color: #6B5B73;
            opacity: 0.8;
            padding: 0 1rem;
            line-height: 1.4;
        }

        /* Mobile direction controls */
        .direction-controls {
            display: none;
            margin-top: 1.5rem;
            touch-action: none;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .d-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #C7CEEA;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            color: #6B5B73;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .d-btn:active, .d-btn.active {
            background: #FF9AA2;
            border-color: #FF9AA2;
            color: #fff;
            transform: scale(0.95);
        }

        .d-btn-up {
            grid-column: 2;
            grid-row: 1;
        }

        .d-btn-left {
            grid-column: 1;
            grid-row: 2;
        }

        .d-btn-right {
            grid-column: 3;
            grid-row: 2;
        }

        .d-btn-down {
            grid-column: 2;
            grid-row: 3;
        }

        #gameCanvas {
            touch-action: none;
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }
            .game-stats {
                gap: 0.5rem;
                margin-bottom: 1rem;
            }
            .stat-box {
                padding: 0.5rem 1rem;
                min-width: 80px;
            }
            .stat-label {
                font-size: 0.65rem;
            }
            .stat-value {
                font-size: 1.2rem;
            }
            .menu-title {
                font-size: 2rem;
            }
            .menu-subtitle {
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }
            .mode-btn {
                width: 140px;
                height: 140px;
            }
            .mode-icon {
                font-size: 2.5rem;
            }
            .mode-name {
                font-size: 1rem;
            }
            .mode-desc {
                font-size: 0.75rem;
            }
            .menu-buttons {
                gap: 0.75rem;
            }
            .game-container {
                margin: 0.5rem auto;
                padding: 0 0.5rem;
            }
            .direction-controls {
                display: block;
            }
            .game-controls p {
                font-size: 0.7rem;
            }
            .go-menu-btn {
                top: 10px;
                left: 10px;
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 400px) {
            .game-title {
                font-size: 1.5rem;
            }
            .d-pad {
                width: 180px;
                height: 180px;
            }
            .d-btn {
                width: 54px;
                height: 54px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="game-container">
        <h1 class="game-title">Neon Snake</h1>

        <div class="game-stats" id="gameStats">
            <!-- 玩家得分 -->
            <div class="stat-box player-score-box">
                <div class="stat-label" id="playerLabel">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <!-- VS 标识 / 等级 -->
            <div class="stat-box vs-box" id="vsBox">
                <div class="stat-label" id="levelLabel">Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <!-- AI 得分（仅在 AI vs YOU 模式下显示） -->
            <div class="stat-box ai-score-box" id="aiScoreBox" style="display: none;">
                <div class="stat-label">AI</div>
                <div class="stat-value" id="aiScore" style="color: #6BB6FF;">0</div>
            </div>
            <!-- 最高分 -->
            <div class="stat-box high-score-box" id="highScoreBox">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="direction-controls" id="directionControls">
            <div class="d-pad">
                <button class="d-btn d-btn-up" data-direction="up" aria-label="Up">▲</button>
                <button class="d-btn d-btn-left" data-direction="left" aria-label="Left">◀</button>
                <button class="d-btn d-btn-right" data-direction="right" aria-label="Right">▶</button>
                <button class="d-btn d-btn-down" data-direction="down" aria-label="Down">▼</button>
            </div>
        </div>

        <div class="game-controls">
            <p>Use Arrow Keys/WASD or Swipe/Buttons to control</p>
        </div>
    </div>

    <!-- Go to Menu button (visible during gameplay) -->
    <button class="go-menu-btn" id="goMenuBtn" onclick="goToMenu()">Go to Menu</button>

    <!-- Main Menu -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-content">
            <h2 class="menu-title">Neon Snake</h2>
            <p class="menu-subtitle">Choose Your Mode</p>
            <div class="menu-buttons">
                <button class="mode-btn challenge-btn" onclick="startChallengeMode()">
                    <span class="mode-icon">🏆</span>
                    <span class="mode-name">Challenge Mode</span>
                    <span class="mode-desc">Progressive levels with increasing speed</span>
                </button>
                <button class="mode-btn regular-btn" onclick="startRegularMode()">
                    <span class="mode-icon">🎮</span>
                    <span class="mode-name">Regular Mode</span>
                    <span class="mode-desc">Classic fixed speed gameplay</span>
                </button>
                <button class="mode-btn ai-btn" onclick="startAIMode()">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-name">AI Mode</span>
                    <span class="mode-desc">Watch an AI snake play automatically</span>
                </button>
                <button class="mode-btn ai-vs-btn" onclick="startAIVsYouMode()">
                    <span class="mode-icon">⚔️</span>
                    <span class="mode-name">AI vs YOU</span>
                    <span class="mode-desc">Battle against AI snake on the same map!</span>
                </button>
            </div>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="overlay-content">
            <h2 style="font-size: 3rem; margin-bottom: 1rem; color: #6B5B73; text-shadow: 0 0 20px rgba(107, 91, 115, 0.2);">GAME OVER</h2>
            <p style="font-size: 1.5rem; color: #6B5B73; margin-bottom: 0.5rem;">Final Score: <span id="finalScore">0</span></p>
            <p id="finalLevelDisplay" style="font-size: 1.2rem; color: #6B5B73; margin-bottom: 2rem; display: none;">Level Reached: <span id="finalLevel">1</span></p>
            <button class="restart-btn" onclick="goToMenu()">Go to Menu</button>
        </div>
    </div>

    <script>

        // ============================================================
        // REGION: 全局变量与配置 (Global Variables & Configuration)
        // ============================================================
        // - DOM 元素引用
        // - 游戏模式变量
        // - 蛇和食物状态
        // - 等级和分数
        // - 配置常量
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreElement = document.getElementById('finalScore');

        // Game mode variables - MUST be declared before any functions that use them
        let gameMode = 'menu'; // 'menu', 'challenge', 'regular', 'ai', or 'aivsyou'
        let isGameRunning = false;
        let isAIMode = false;
        let isAIVsYouMode = false;
        let aiRespawnTimer = null;

        // AI vs YOU mode - AI snake data
        let aiSnake = [];
        let aiDirection = {x: 0, y: 0};
        let playerWon = false;

        // Set responsive canvas size - ensure exact fit for grid
        function setCanvasSize() {
            let maxSize;
            if (isAIVsYouMode) {
                // AI vs YOU mode: larger canvas for 30x30 grid
                maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 300, 800);
                // Round down to nearest multiple of 30 for perfect grid alignment
                const adjustedSize = Math.floor(maxSize / 30) * 30;
                canvas.width = adjustedSize;
                canvas.height = adjustedSize;
            } else {
                // Normal mode: 20x20 grid
                maxSize = Math.min(window.innerWidth - 40, window.innerHeight - 300, 600);
                // Round down to nearest multiple of 20 for perfect grid alignment
                const adjustedSize = Math.floor(maxSize / 20) * 20;
                canvas.width = adjustedSize;
                canvas.height = adjustedSize;
            }
        }

        setCanvasSize();
        window.addEventListener('resize', () => {
            setCanvasSize();
            draw();
        });

        // Game settings - CORRECT GRID CALCULATION
        function getGameSettings() {
            // AI vs YOU mode uses 30x30 grid, others use 20x20
            const tileCount = isAIVsYouMode ? 30 : 20;
            const gridSize = Math.floor(canvas.width / tileCount); // Integer size for each cell
            return { gridSize, tileCount };
        }

        // Fruit types with different point values
        const fruitTypes = [
            { emoji: '🍒', points: 1, color: '#ff0066' },     // Cherry
            { emoji: '🍓', points: 2, color: '#ff3300' },     // Strawberry
            { emoji: '🍊', points: 3, color: '#ff6600' },     // Orange
            { emoji: '🥝', points: 4, color: '#66ff00' },     // Kiwi
            { emoji: '🍇', points: 5, color: '#9900ff' },     // Grapes
            { emoji: '🍉', points: 6, color: '#00ff99' },     // Watermelon
            { emoji: '🍑', points: 7, color: '#ffcc00' },     // Peach
            { emoji: '🥭', points: 8, color: '#ffcc00' },     // Mango
            { emoji: '🍍', points: 9, color: '#ffff00' },     // Pineapple
            { emoji: '🥥', points: 10, color: '#8b4513' }     // Coconut
        ];

        const powerUpTypes = [
            { emoji: '⏰', type: 'slow', duration: 30000, color: '#B5EAD7' },          // 减速道具
            { emoji: '🧺', type: 'extra', color: '#E2F0CB' },                         // 额外水果

        // Calculate current game speed based on mode and level
        function calculateGameSpeed() {
            let baseSpeed;

            if (gameMode === 'regular') {
                // Regular mode: fixed speed
                baseSpeed = REGULAR_CONFIG.FIXED_SPEED;
            } else if (gameMode === 'ai') {
                // AI mode: fixed faster speed for smoother viewing
                baseSpeed = AI_CONFIG.FIXED_SPEED;
            } else {
                // Challenge mode: speed based on level
                baseSpeed = LEVEL_CONFIG.INITIAL_SPEED -
                    (level - 1) * LEVEL_CONFIG.SPEED_DECREMENT_PER_LEVEL;
                // Ensure we don't go below minimum speed
                baseSpeed = Math.max(baseSpeed, LEVEL_CONFIG.MIN_SPEED);
            }

            // Apply slow motion effect if active
            if (isSlowed) {
                return baseSpeed * 1.5; // 50% slower when slow power-up is active
            }

            return baseSpeed;
        }

        // Check and handle level up (only in challenge mode)
        function checkLevelUp() {
            if (gameMode !== 'challenge') return false;

            const newLevel = Math.floor(score / LEVEL_CONFIG.POINTS_PER_LEVEL) + 1;
            if (newLevel > level) {
                level = newLevel;
                updateLevelDisplay();
                showLevelUpEffect();
                return true;
            }
            return false;
        }

        // Update level display on UI
        function updateLevelDisplay() {
            const levelElement = document.getElementById('level');
            const levelLabel = levelElement?.parentElement?.querySelector('.stat-label');

            if (levelElement) {
                if (gameMode === 'challenge') {
                    // Show level in challenge mode
                    levelElement.textContent = level;
                    levelElement.parentElement.style.display = 'block';

                    // Animate level up
                    levelElement.style.transform = 'scale(1.5)';
                    levelElement.style.color = '#E2F0CB'; // Mint green for level up
                    setTimeout(() => {
                        levelElement.style.transform = 'scale(1)';
                        levelElement.style.color = '#FF9AA2'; // Back to strawberry pink
                    }, 500);
                } else if (gameMode === 'ai') {
                    // In AI mode, show "AI" instead of level
                    levelElement.textContent = 'AI';
                    levelElement.parentElement.style.display = 'block';
                } else {
                    // Hide level display in regular mode
                    levelElement.parentElement.style.display = 'none';
                }
            }
        }

            effectDiv.innerHTML = `

                    <div>LEVEL UP!</div>

                    <div style="font-size: 1rem; opacity: 0.8; margin-top: 0.5rem;">Speed increased!</div>
                </div>
            `;

            // Add animation style
            const style = document.createElement('style');
            style.textContent = `

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            processPowerUps();

            const currentSpeed = calculateGameSpeed();
            setTimeout(gameLoop, currentSpeed);
        }

        // Process active power-ups
        function processPowerUps() {
            const now = Date.now();
            activePowerUps = activePowerUps.filter(powerUp => {
                if (now - powerUp.activationTime >= powerUp.duration) {
                    // Power-up expired, remove effect
                    switch(powerUp.type) {
                        case 'slow':
                            isSlowed = false;
                            break;
                    }
                    return false; // Remove from active power-ups
                }
                return true; // Keep active
            });
        }

        function update() {
            const { tileCount } = getGameSettings();

            // In AI vs YOU mode, update AI snake first
            if (isAIVsYouMode) {
                updateAI();
            }

            // If no direction set, don't move
            if (direction.x === 0 && direction.y === 0) {
                return;
            }

            // Move snake head
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check boundaries
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision (skip the head itself)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            // In AI vs YOU mode, check collision with AI snake
            if (isAIVsYouMode) {
                // Player head hits AI snake body -> player loses
                for (let i = 0; i < aiSnake.length; i++) {
                    if (head.x === aiSnake[i].x && head.y === aiSnake[i].y) {
                        gameOver();
                        return;
                    }
                }
            }

            // Standard snake movement: unshift new head
            snake.unshift({...head, fruit: null});

            // Check food collision with all foods
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    const eatenItem = foods[i];

                    if (eatenItem.isPowerUp) {
                        // Handle power-up
                        switch(eatenItem.type) {
                            case 'slow':
                                activateSlow();
                                break;
                            case 'extra':
                                activateExtra();
                                break;
                            case 'line':
                                activateLine();
                                break;
                            case 'blizzard':
                                activateBlizzard();
                                break;
                            case 'coconut':
                                activateCoconutPalm();
                                break;
                            case 'cherrytree':
                                activateCherryTree();
                                break;
                        }
                        foods.splice(i, 1);
                        foodEaten = true;
                        break;
                    } else {
                        // Handle normal fruit
                        score += eatenItem.points;
                        updateScore();
                        createParticles(eatenItem);

                        // Set the fruit at the head (where it was eaten)
                        snake[0].fruit = eatenItem;

                        foods.splice(i, 1);
                        foodEaten = true;
                        break;
                    }
                }
            }

            if (!foodEaten) {
                // Remove tail segment
                snake.pop();
            } else {
                // Generate a new food if we're below the target count
                const targetFoodCount = isAIVsYouMode ? BASE_FOOD_COUNT_AI_VS : BASE_FOOD_COUNT;
                if (foods.length < targetFoodCount) {
                    const newFood = generateSingleFood();
                    if (newFood) {
                        foods.push(newFood);
                    }
                }
            }

            // Shift fruits through the snake body (move them backward/toward tail)
            for (let i = snake.length - 1; i > 0; i--) {
                snake[i].fruit = snake[i - 1].fruit;
            }
            snake[0].fruit = null;
        }

        // Generate a single food item (fruit or power-up)
        function generateSingleFood() {
            const { tileCount } = getGameSettings();
            const isPowerUp = Math.random() < POWERUP_CHANCE;
            let newItem;

            if (isPowerUp) {
                // Generate power-up
                const randomPowerUp = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                newItem = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    ...randomPowerUp,
                    isPowerUp: true
                };
            } else {
                // Generate normal fruit
                const randomFruit = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                newItem = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    ...randomFruit
                };
            }

            // Check position
            let validPosition = true;
            for (let segment of snake) {
                if (segment.x === newItem.x && segment.y === newItem.y) {
                    validPosition = false;
                    break;
                }
            }

            // In AI vs YOU mode, also check AI snake positions
            if (validPosition && isAIVsYouMode) {
                for (let segment of aiSnake) {
                    if (segment.x === newItem.x && segment.y === newItem.y) {
                        validPosition = false;
                        break;
                    }
                }
            }

            if (validPosition) {
                for (let existingFood of foods) {
                    if (existingFood.x === newItem.x && existingFood.y === newItem.y) {
                        validPosition = false;
                        break;
                    }
                }
            }

            return validPosition ? newItem : generateSingleFood(); // Recursive if invalid position
        }

        // 根据方向获取蛇头 emoji
        function getSnakeHeadEmoji(isAI, dir) {
            const emojiSet = isAI ? SNAKE_EMOJIS.ai : SNAKE_EMOJIS.player;
            if (dir.x === 0 && dir.y === -1) return emojiSet.up;
            if (dir.x === 0 && dir.y === 1) return emojiSet.down;
            if (dir.x === -1 && dir.y === 0) return emojiSet.left;
            if (dir.x === 1 && dir.y === 0) return emojiSet.right;
            return emojiSet.default;
        }

        // 计算 emoji 旋转角度（根据方向）
        function getEmojiRotation(dir) {
            if (dir.x === 0 && dir.y === -1) return 0;      // 上
            if (dir.x === 0 && dir.y === 1) return 180;     // 下
            if (dir.x === -1 && dir.y === 0) return -90;    // 左
            if (dir.x === 1 && dir.y === 0) return 90;      // 右
            return 0;
        }

        function draw() {
            const { gridSize, tileCount } = getGameSettings();

            // 奶油白背景
            ctx.fillStyle = '#FFF9F5';

            // 绘制subtle网格 - 淡薰衣草色

            ctx.lineWidth = 1;
            ctx.fillStyle = '#FFF9F5';

            for (let y = 0; y < tileCount; y++) {
                for (let x = 0; x < tileCount; x++) {
                    const xPos = x * gridSize;
                    const yPos = y * gridSize;

                    // Fill cell background
                    ctx.fillRect(xPos, yPos, gridSize, gridSize);

                    // Draw cell border
                    ctx.strokeRect(xPos, yPos, gridSize, gridSize);
                }
            }

            console.log('Drawing snake, segments:', snake.length);

            // 马卡龙色系数组 - 蛇身分段不同颜色
            const macaronColors = [
                '#FFB7B2', /* 蜜桃粉 */
                '#FFDAC1', /* 奶油杏 */
                '#E2F0CB', /* 薄荷绿 */
                '#C7CEEA', /* 薰衣草紫 */
                '#F8B195', /* 珊瑚橘 */
                '#B5EAD7', /* 冰蓝绿 */

            // Draw snake with appropriate colors (AI mode = blue, normal = macaron)
            snake.forEach((segment, index) => {
                console.log(`Drawing segment ${index} at`, segment);

                if (isAIMode) {
                    // AI snake - all blue color scheme
                    if (index === 0) {
                        // AI 蛇头 - 使用机器人 Emoji
                        const headEmoji = getSnakeHeadEmoji(true, aiDirection);
                        const rotation = getEmojiRotation(aiDirection);

                        ctx.save();
                        ctx.translate(segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2);

                        // Subtle border
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                    }
                } else {
                    // Player snake
                    if (index === 0) {
                        // 蛇头 - 使用 Emoji

                        // Subtle border
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);

                        ctx.fillText(headEmoji, 0, 0);
                        ctx.restore();
                    } else {

                        // Subtle border
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';

                        ctx.strokeRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                    }

                    // Add fruit if present - emoji on background
                    if (segment.fruit && segment.fruit.emoji) {
                        // Draw white background for fruit
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);

                        // Draw fruit emoji
                        ctx.font = `${gridSize * 0.7}px Arial, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#000000';
                        ctx.fillText(segment.fruit.emoji, segment.x * gridSize + gridSize / 2, segment.y * gridSize + gridSize / 2);

                // Draw labels for snakes

        function activateSlow() {

            activePowerUps.push({

        function activateExtra() {
            // 添加10个随机水果
            const { tileCount } = getGameSettings();
            let addedCount = 0;
            for (let i = 0; i < 10 && foods.length < 20; i++) {

                    x: Math.floor(Math.random() * tileCount),

                draw(); // Keep the final frame visible
                aiRespawnTimer = setTimeout(() => {
                    if (isAIMode) {
                        restartAIGame();
                    }
                }, 2000);
                return;
            }

            // AI vs YOU mode - show win/lose message
            if (isAIVsYouMode) {
                const overlayContent = gameOverlay.querySelector('.overlay-content');
                const gameOverTitle = overlayContent.querySelector('h2');
                const finalScoreP = overlayContent.querySelector('p');

                if (playerWon) {

                    finalScoreP.innerHTML = 'You defeated the AI!<br><br>Score: <span id="finalScore">' + score + '</span>';

                    gameOverTitle.style.color = '#FF9AA2';
                    finalScoreP.innerHTML = 'The AI defeated you!<br><br>Score: <span id="finalScore">' + score + '</span>';
                }

                gameOverlay.style.display = 'flex';
                return;
            }

            // Update final score - need to re-get element as it may have been replaced in AI vs YOU mode
            const currentFinalScoreElement = document.getElementById('finalScore');
            if (currentFinalScoreElement) {
                currentFinalScoreElement.textContent = score;
            }

            // Show level reached in challenge mode

                finalLevelDisplay.style.display = 'block';

            if (score > 100) {

        // Update AI snake position in AI vs YOU mode
        function updateAI() {
            if (!isAIVsYouMode || !gameRunning) return;

            const { tileCount } = getGameSettings();

            // If no direction set, don't move
            if (aiDirection.x === 0 && aiDirection.y === 0) {
                return;
            }

            // Move AI snake head
            const head = {x: aiSnake[0].x + aiDirection.x, y: aiSnake[0].y + aiDirection.y};

            // Check boundaries - AI dies
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                playerWon = true;
                gameOver();
                return;
            }

            // Check self collision - AI dies
            for (let i = 1; i < aiSnake.length; i++) {
                if (head.x === aiSnake[i].x && head.y === aiSnake[i].y) {
                    playerWon = true;
                    gameOver();
                    return;
                }
            }

            // Check collision with player snake
            // AI head hits player snake body -> AI dies, player wins
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    playerWon = true;
                    gameOver();
                    return;
                }
            }

            // Move AI snake
            aiSnake.unshift({...head, fruit: null});

            // Check food collision
            let foodEaten = false;
            for (let i = 0; i < foods.length; i++) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    const eatenItem = foods[i];

                    if (eatenItem.isPowerUp) {
                        // AI gets power-up effects too
                        switch(eatenItem.type) {
                            case 'slow':
                                activateSlow();
                                break;
                            case 'extra':
                                activateExtra();
                                break;
                            case 'line':
                                activateLine();
                                break;
                            case 'blizzard':
                                activateBlizzard();
                                break;
                            case 'coconut':
                                activateCoconutPalm();
                                break;
                            case 'cherrytree':
                                activateCherryTree();
                                break;
                        }
                        foods.splice(i, 1);
                        foodEaten = true;
                        break;
                    } else {
                        // Handle normal fruit
                        aiScore += eatenItem.points;  // 增加 AI 分数
                        eatenItem.emoji = foods[i].emoji;
                        aiSnake[0].fruit = eatenItem;
                        updateAIScore();  // 更新 AI 分数显示
                        foods.splice(i, 1);
                        foodEaten = true;
                        break;
                    }
                }
            }

            if (!foodEaten) {
                // Remove tail segment
                aiSnake.pop();
            } else {
                // Generate a new food if we're below the target count
                const targetFoodCount = BASE_FOOD_COUNT_AI_VS;
                if (foods.length < targetFoodCount) {
                    const newFood = generateSingleFood();
                    if (newFood) {
                        foods.push(newFood);
                    }
                }
            }

            // Shift fruits through the AI snake body
            for (let i = aiSnake.length - 1; i > 0; i--) {
                aiSnake[i].fruit = aiSnake[i - 1].fruit;
            }
            aiSnake[0].fruit = null;
        }

        // AI decision making for AI vs YOU mode (改进版)
        function makeAIVsYouDecision() {
            if (!gameRunning || !isAIVsYouMode) return;

            const head = aiSnake[0];
            const { tileCount } = getGameSettings();

            // AI imperfection factors
            const MISTAKE_CHANCE = 0.15; // 15% chance to make a suboptimal move
            const MAKE_MISTAKE = Math.random() < MISTAKE_CHANCE;

            // Get possible directions (excluding reverse)
            const currentDir = aiDirection;
            const possibleDirs = [
                {x: 0, y: -1, name: 'up'},    // up
                {x: 0, y: 1, name: 'down'},   // down
                {x: -1, y: 0, name: 'left'},  // left
                {x: 1, y: 0, name: 'right'}   // right
            ].filter(dir => {
                // Can't go reverse
                if (currentDir.x !== 0 || currentDir.y !== 0) {
                    if (dir.x === -currentDir.x && dir.y === -currentDir.y) {
                        return false;
                    }
                }
                return true;
            });

            // Filter valid moves (not hitting wall, self, or player)
            let validMoves = [];
            for (let dir of possibleDirs) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;

                // Check bounds
                if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;

                // Check self collision
                let hitsSelf = false;
                for (let i = 0; i < aiSnake.length - 1; i++) { // 排除尾巴，因为会移动
                    if (aiSnake[i].x === newX && aiSnake[i].y === newY) {
                        hitsSelf = true;
                        break;
                    }
                }
                if (hitsSelf) continue;

                // Check player collision
                let hitsPlayer = false;
                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === newX && snake[i].y === newY) {
                        hitsPlayer = true;
                        break;
                    }
                }
                if (hitsPlayer) continue;

                validMoves.push({dir, newX, newY});
            }

            if (validMoves.length === 0) return;

            // 评估所有食物，按综合评分排序
            const evaluations = [];
            for (let food of foods) {
                const eval = evaluateFoodAIVsYou(head, food, tileCount);
                if (eval) evaluations.push(eval);
            }
            evaluations.sort((a, b) => b.score - a.score);

            // 尝试吃最安全且评分高的食物
            for (let eval of evaluations) {
                const next = eval.path[0];
                const dirX = next.x - head.x;
                const dirY = next.y - head.y;

                // 检查该移动是否在有效移动列表中
                const moveIndex = validMoves.findIndex(m => m.dir.x === dirX && m.dir.y === dirY);
                if (moveIndex === -1) continue;

                // 安全检查
                if (!eval.isSafe) continue;

                // 执行移动
                if (!MAKE_MISTAKE) {
                    aiDirection = {x: dirX, y: dirY};
                    return;
                }
            }

            // 没有安全食物或选择犯错时，使用评分系统选择移动
            let scoredMoves = [];
            for (let move of validMoves) {
                let score = 0;

                // 空间评估
                const space = countAccessibleSpaceAIVsYou(move.newX, move.newY, tileCount);
                score += space * 3;

                // 如果评估了食物，使用最近的距离
                if (evaluations.length > 0) {
                    const nearestEval = evaluations[0];
                    const distToFood = Math.abs(move.newX - nearestEval.food.x) + Math.abs(move.newY - nearestEval.food.y);
                    score -= distToFood * 5;
                }

                // 避免墙壁
                const wallDist = Math.min(move.newX, move.newY, tileCount - 1 - move.newX, tileCount - 1 - move.newY);
                score += wallDist * 3;

                scoredMoves.push({move, score});
            }

            scoredMoves.sort((a, b) => b.score - a.score);

            // 选择移动
            let chosenMove;
            if (MAKE_MISTAKE && scoredMoves.length > 1) {
                const mistakeIndex = Math.floor(Math.random() * Math.min(scoredMoves.length, 3));
                chosenMove = scoredMoves[mistakeIndex].move;
            } else {
                chosenMove = scoredMoves[0].move;
            }

            aiDirection = {x: chosenMove.dir.x, y: chosenMove.dir.y};
        }

        // 评估食物（AI vs YOU模式）
        function evaluateFoodAIVsYou(head, food, tileCount) {
            // 寻找路径
            const path = findPathToFoodAIVsYou(head.x, head.y, food.x, food.y);
            if (!path || path.length === 0) return null;

            // 基础分值
            let baseScore = 0;
            if (food.points) {
                baseScore += food.points * 10;
            }

            // 道具奖励
            const POWERUP_BONUS = {
                'slow': 15, 'extra': 20, 'line': 18,
                'blizzard': 25, 'coconut': 30, 'cherrytree': 20
            };
            if (food.type && POWERUP_BONUS[food.type]) {
                baseScore += POWERUP_BONUS[food.type] * 10;
            }

            // 路径长度惩罚
            const pathLength = path.length;

            // 风险评估
            let risk = 0;
            let isSafe = true;

            // 检查吃完后的空间
            const newHead = path[path.length - 1];
            const space = countAccessibleSpaceAIVsYou(newHead.x, newHead.y, tileCount);
            const minSpace = aiSnake.length * 1.5;

            if (space < minSpace) {
                risk += 50;
                isSafe = false;
            }

            // 墙壁惩罚
            const wallDist = Math.min(newHead.x, newHead.y, tileCount - 1 - newHead.x, tileCount - 1 - newHead.y);
            if (wallDist === 0) risk += 10;

            const score = (baseScore / Math.sqrt(pathLength + 1)) - risk;

            return {food, score, path, risk, isSafe, pathLength};
        }

        // BFS寻找路径（AI vs YOU模式）
        function findPathToFoodAIVsYou(startX, startY, targetX, targetY) {

                            }
                        }

        // Count accessible space from a position in AI vs YOU mode

                    {x: x + 1, y: y},
                    {x: x - 1, y: y},
                    {x: x, y: y + 1},
                    {x: x, y: y - 1}
                ];

        // AI pathfinding - find the best direction to reach food (改进版)
        function makeAIDecision() {

            const possibleDirs = [

            for (let dir of possibleDirs) {

            const isSmallMediumSnake = snake.length < 30; // 小于30节都视为中等蛇

                let targetFood = foods[0];

                for (let food of foods) {

                // 选择能缩短距离的方向
                let candidates = [];
                for (let move of safeMoves) {

                    if (newDist < minFoodDist) {

            const totalCells = tileCount * tileCount;

            if (snakeRatio >= 0.30) {

                if (tailMove) {

            // 8. 对于小蛇（<30%面积），即使前面策略都失败，也要强制吃最近的食物
            // 而不是进入保命模式
            if (snakeRatio < 0.30 && foods.length > 0 && safeMoves.length > 0) {

                let targetFood = foods[0];
                let minFoodDist = Infinity;
                for (let food of foods) {

                    if (dist < minFoodDist) {

                let candidates = [];
                for (let move of safeMoves) {

                    if (newDist < minFoodDist) {

                // 最后保底：任何安全移动

        // Count accessible space from a position (flood fill)
        function countAccessibleSpace(startX, startY, tileCount, excludeTail = false) {
            const visited = new Set();
            const queue = [{x: startX, y: startY}];
            visited.add(`${startX},${startY}`);
            let count = 0;
            const maxCount = 400; // 增加搜索范围以支持更长的蛇，更保守的空间检查

            const tailIndex = excludeTail ? snake.length - 1 : -1;

            while (queue.length > 0 && count < maxCount) {
                const {x, y} = queue.shift();
                count++;

                const neighbors = [
                    {x: x + 1, y: y},
                    {x: x - 1, y: y},
                    {x: x, y: y + 1},
                    {x: x, y: y - 1}
                ];

                for (let n of neighbors) {
                    if (n.x < 0 || n.x >= tileCount || n.y < 0 || n.y >= tileCount) continue;

                    const key = `${n.x},${n.y}`;
                    if (visited.has(key)) continue;

                    // Check if occupied by snake (exclude tail if needed)
                    let occupied = false;
                    for (let i = 0; i < snake.length; i++) {
                        if (i === tailIndex) continue; // 跳过尾巴（因为下一步尾巴会移开）
                        if (snake[i].x === n.x && snake[i].y === n.y) {
                            occupied = true;
                            break;
                        }
                    }

                    if (!occupied) {
                        visited.add(key);
                        queue.push(n);
                    }
                }
            }

            return count;
        }

        // 辅助函数：使用 BFS 寻找通往食物的路径
        function findPathToFood(startX, startY, targetX, targetY, excludeTail = false) {
            const { tileCount } = getGameSettings();

            // 小蛇（<15节）时更积极地排除尾巴，增加找到路径的概率
            // 因为小蛇移动快，尾巴会迅速离开当前位置
            const actuallyExcludeTail = snake.length < 15 ? true : excludeTail;

            const queue = [{x: startX, y: startY, path: []}];
            const visited = new Set();
            visited.add(`${startX},${startY}`);

            const tailIndex = actuallyExcludeTail ? snake.length - 1 : -1;

            while (queue.length > 0) {
                const current = queue.shift();

                if (current.x === targetX && current.y === targetY) {
                    return current.path;
                }

                const directions = [
                    {x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0}
                ];

                for (let dir of directions) {
                    const newX = current.x + dir.x;
                    const newY = current.y + dir.y;
                    const key = `${newX},${newY}`;

                    if (visited.has(key)) continue;
                    if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;

                    // Check collision with snake body
                    let isBody = false;
                    for (let i = 0; i < snake.length; i++) {
                        if (i === tailIndex) continue;
                        if (snake[i].x === newX && snake[i].y === newY) {
                            isBody = true;
                            break;
                        }
                    }

                    if (isBody) continue;

                    visited.add(key);
                    queue.push({
                        x: newX,
                        y: newY,
                        path: [...current.path, {x: newX, y: newY}]
                    });
                }
            }

            return null; // No path found
        }

        // 辅助函数：检查路径是否安全（吃完食物后有逃生路线）
        function isPathSafe(path, foodX, foodY) {
            if (!path || path.length === 0) return false;

            // 模拟蛇吃完食物后的状态
            const newHead = path[path.length - 1];
            const newSnakeLength = snake.length + 1;

            // 检查吃完食物后的可达空间
            // 蛇会增长，所以需要更多空间
            const minSpace = newSnakeLength * 1.2;
            const accessibleSpace = countAccessibleSpace(newHead.x, newHead.y, tileCount, false);

            return accessibleSpace >= minSpace;

        // 辅助函数：检查吃完食物后是否能安全到达尾巴
        function canSafelyReachFood(pathToFood) {
            if (!pathToFood || pathToFood.length === 0) return false;

            const foodPos = pathToFood[pathToFood.length - 1];

            // 模拟吃完食物后的蛇状态（蛇身增长）
            const simulatedSnake = [
                {x: foodPos.x, y: foodPos.y},  // 新头部在食物位置
                ...snake.map(s => ({...s}))    // 复制当前蛇身
            ];

            // 找从食物位置到尾巴的路径
            const pathToTail = findPathFromSnake(simulatedSnake, simulatedSnake.length - 1);

            return pathToTail !== null;  // 只有能找到到尾巴的路径才安全
        }

        // 辅助函数：从指定蛇状态寻找路径到指定目标索引（用于模拟）
        function findPathFromSnake(simulatedSnake, targetIndex) {
            const { tileCount } = getGameSettings();
            const head = simulatedSnake[0];
            const target = simulatedSnake[targetIndex];

            const queue = [{x: head.x, y: head.y, path: []}];
            const visited = new Set();
            visited.add(`${head.x},${head.y}`);

            // 构建障碍物集合（排除目标位置，因为那是我们要到达的）
            const obstacleSet = new Set();
            for (let i = 0; i < simulatedSnake.length; i++) {
                if (i !== targetIndex) {  // 目标位置（通常是尾巴）不作为障碍物
                    obstacleSet.add(`${simulatedSnake[i].x},${simulatedSnake[i].y}`);
                }
            }

            while (queue.length > 0) {
                const current = queue.shift();

                if (current.x === target.x && current.y === target.y) {

                }

                const directions = [
                    {x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0}
                ];

                for (let dir of directions) {
                    const newX = current.x + dir.x;
                    const newY = current.y + dir.y;
                    const key = `${newX},${newY}`;

                    if (visited.has(key)) continue;
                    if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;
                    if (obstacleSet.has(key)) continue;

                    visited.add(key);
                    queue.push({
                        x: newX,
                        y: newY,
                        path: [...current.path, {x: newX, y: newY}]
                    });
                }
            }

            return null; // No path found
        }

        // 辅助函数：计算到尾巴的路径（用于跟随尾巴策略）
        function findPathToTail(startX, startY) {
            const tail = snake[snake.length - 1];
            return findPathToFood(startX, startY, tail.x, tail.y, true);
        }

        // 辅助函数：检查移动是否安全（不会立即死亡）
        function isSafeMove(newX, newY, excludeTail = true) {
            const { tileCount } = getGameSettings();

            // Check bounds
            if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) {
                return false;
            }

            const tailIndex = excludeTail ? snake.length - 1 : -1;

            // Check collision with snake body
            for (let i = 0; i < snake.length; i++) {
                // 小蛇特殊处理：当蛇少于8节时，第二节（颈部）永远视为障碍物
                // 这是最关键的，防止头部回退撞到自己的身体
                if (snake.length < 8 && i === 1) {
                    if (snake[i].x === newX && snake[i].y === newY) {
                        return false;
                    }
                    continue; // 颈部检查完后跳过，不再重复检查
                }

                // 排除尾巴（如果启用）
                if (i === tailIndex) continue;

                if (snake[i].x === newX && snake[i].y === newY) {
                    return false;
                }
            }

            return true;
        }

        // ==================== REGION: 哈密尔顿回路 ====================

        const hamiltonianCycle = {
            cycle: null,
            tileCount: 0,

            initialize(tileCount) {
                this.tileCount = tileCount;
                this.cycle = new Array(tileCount * tileCount);
                this.generateSerpentineCycle();
            },

            // 生成蛇形哈密尔顿回路
            generateSerpentineCycle() {
                let index = 0;
                for (let y = 0; y < this.tileCount; y++) {
                    if (y % 2 === 0) {
                        // 偶数行：从左到右
                        for (let x = 0; x < this.tileCount; x++) {
                            this.cycle[index] = { x, y, nextIndex: index + 1 };
                            index++;
                        }
                    } else {
                        // 奇数行：从右到左
                        for (let x = this.tileCount - 1; x >= 0; x--) {
                            this.cycle[index] = { x, y, nextIndex: index + 1 };
                            index++;
                        }
                    }
                }
                // 最后一个节点连接回第一个
                if (this.cycle.length > 0) {
                    this.cycle[this.cycle.length - 1].nextIndex = 0;
                }
            },

            // 获取位置在回路中的索引
            getIndex(x, y) {
                for (let i = 0; i < this.cycle.length; i++) {
                    if (this.cycle[i].x === x && this.cycle[i].y === y) {
                        return i;
                    }
                }
                return -1;
            },

            // 获取下一个方向
            getDirection(headX, headY) {
                const currentIndex = this.getIndex(headX, headY);
                if (currentIndex === -1) return null;

                const nextIndex = this.cycle[currentIndex].nextIndex;
                const nextPos = this.cycle[nextIndex];

                return {
                    x: nextPos.x - headX,
                    y: nextPos.y - headY
                };
            },

            // 计算沿回路的距离（从from到to）
            getDistance(fromX, fromY, toX, toY) {
                const fromIndex = this.getIndex(fromX, fromY);
                const toIndex = this.getIndex(toX, toY);

                if (fromIndex === -1 || toIndex === -1) return Infinity;

                let distance = 0;
                let current = fromIndex;
                const totalCells = this.tileCount * this.tileCount;

                while (current !== toIndex && distance < totalCells) {
                    current = this.cycle[current].nextIndex;
                    distance++;
                }

                return distance;
            }
        };

        // 检查是否应该启用哈密尔顿保命模式
        function shouldUseHamiltonianMode() {
            const { tileCount } = getGameSettings();
            const totalCells = tileCount * tileCount;
            const snakeRatio = snake.length / totalCells;
            // 当蛇身超过50%地图且至少20节时才启用哈密尔顿模式
            // 避免小蛇时过度保守
            return snake.length >= 20 && snakeRatio >= 0.50;
