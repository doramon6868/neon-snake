        // 执行哈密尔顿移动（改进版 - 允许临时偏离吃食物）
        function makeHamiltonianMove() {
            const { tileCount } = getGameSettings();
            const head = snake[0];

            // 确保回路已初始化
            if (hamiltonianCycle.tileCount !== tileCount) {
                hamiltonianCycle.initialize(tileCount);
            }

            // 获取当前在回路中的索引
            const currentIndex = hamiltonianCycle.getIndex(head.x, head.y);
            if (currentIndex === -1) return null;

            // 检查是否有食物在哈密尔顿回路上且可以安全到达
            let bestFood = null;
            let bestFoodIndex = -1;
            let minFoodDistance = Infinity;

            for (let food of foods) {
                const foodIndex = hamiltonianCycle.getIndex(food.x, food.y);
                if (foodIndex === -1) continue;

                // 计算从当前位置沿回路到食物的距离
                let dist = 0;
                let current = currentIndex;
                while (current !== foodIndex && dist < tileCount * tileCount) {
                    current = hamiltonianCycle.cycle[current].nextIndex;
                    dist++;
                }

                // 检查食物是否在前进方向上且距离合适
                if (dist > 0 && dist < minFoodDistance && dist <= snake.length + 5) {
                    // 检查路径是否安全
                    let pathSafe = true;
                    current = currentIndex;
                    for (let i = 0; i < dist && i < 10; i++) { // 最多检查10步
                        current = hamiltonianCycle.cycle[current].nextIndex;
                        const pos = hamiltonianCycle.cycle[current];
                        if (!isSafeMove(pos.x, pos.y, true)) {
                            pathSafe = false;
                            break;
                        }
                    }

                    if (pathSafe) {
                        minFoodDistance = dist;
                        bestFood = food;
                        bestFoodIndex = foodIndex;
                    }
                }
            }

            // 获取哈密尔顿回路的下一个方向
            const nextIndex = hamiltonianCycle.cycle[currentIndex].nextIndex;
            const nextPos = hamiltonianCycle.cycle[nextIndex];
            const hamiltonDir = {
                x: nextPos.x - head.x,
                y: nextPos.y - head.y
            };

            // 如果下一步就是食物，直接去吃
            if (bestFood && minFoodDistance === 1) {
                const foodDirX = bestFood.x - head.x;
                const foodDirY = bestFood.y - head.y;
                if (isSafeMove(bestFood.x, bestFood.y, true)) {
                    return { x: foodDirX, y: foodDirY };
                }
            }

            // 优先沿哈密尔顿回路移动
            if (isSafeMove(nextPos.x, nextPos.y, true)) {
                return hamiltonDir;
            }

            // 如果回路被堵住，尝试其他安全移动
            const directions = [
                { x: 0, y: -1 }, { x: 0, y: 1 },
                { x: -1, y: 0 }, { x: 1, y: 0 }
            ].filter(dir => {
                if (direction.x !== 0 || direction.y !== 0) {
                    if (dir.x === -direction.x && dir.y === -direction.y) return false;
                }
                return true;
            });

            for (let dir of directions) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;
                if (isSafeMove(newX, newY, true)) {
                    return dir;
                }
            }

            return null;
        }

        // ==================== REGION: 食物评估系统 ====================

        const FOOD_EVALUATION = {
            POINTS_WEIGHT: 10,
            POWERUP_BONUS: {
                'slow': 15,
                'extra': 20,
                'line': 18,
                'blizzard': 25,
                'coconut': 30,
                'cherrytree': 20
            },
            RISK_FACTORS: {
                MIN_SPACE_RATIO: 1.5,
                WALL_PENALTY: 5,
                CORNER_PENALTY: 10,
                TRAP_PENALTY: 50
            }
        };

        // 评估单个食物
        function evaluateFood(food) {
            const head = snake[0];
            const { tileCount } = getGameSettings();

            // 1. BFS寻找路径
            const path = findPathToFood(head.x, head.y, food.x, food.y, true);
            if (!path || path.length === 0) return null;

            // 2. 计算基础分值
            let baseScore = 0;

            // 食物分值权重
            if (food.points) {
                baseScore += food.points * FOOD_EVALUATION.POINTS_WEIGHT;
            }

            // 道具类型奖励
            if (food.type && FOOD_EVALUATION.POWERUP_BONUS[food.type]) {
                baseScore += FOOD_EVALUATION.POWERUP_BONUS[food.type] * FOOD_EVALUATION.POINTS_WEIGHT;
            }

            // 3. 路径长度惩罚（距离越远，得分越低）
            const pathLength = path.length;
            const distancePenalty = Math.sqrt(pathLength) * 5;

            // 4. 风险评估
            let risk = 0;
            let isSafe = true;

            // 4.1 检查吃完后的空间
            const newHead = path[path.length - 1];
            const newSnakeLength = snake.length + 1;
            const minSpace = newSnakeLength * FOOD_EVALUATION.RISK_FACTORS.MIN_SPACE_RATIO;

            // 使用时间窗口空间计算
            const accessibleSpace = countAccessibleSpaceWithTimeWindow(newHead.x, newHead.y, tileCount, path.length);

            if (accessibleSpace < minSpace) {
                risk += FOOD_EVALUATION.RISK_FACTORS.TRAP_PENALTY;
                isSafe = false;
            } else if (accessibleSpace < minSpace * 1.5) {
                risk += FOOD_EVALUATION.RISK_FACTORS.CORNER_PENALTY;
            }

            // 4.2 墙壁惩罚
            const wallDist = Math.min(newHead.x, newHead.y, tileCount - 1 - newHead.x, tileCount - 1 - newHead.y);
            if (wallDist === 0) {
                risk += FOOD_EVALUATION.RISK_FACTORS.WALL_PENALTY;
            } else if (wallDist === 1) {
                risk += FOOD_EVALUATION.RISK_FACTORS.WALL_PENALTY / 2;
            }

            // 4.3 角落惩罚
            if (wallDist === 0 && (newHead.x <= 1 || newHead.x >= tileCount - 2) &&
                (newHead.y <= 1 || newHead.y >= tileCount - 2)) {
                risk += FOOD_EVALUATION.RISK_FACTORS.CORNER_PENALTY;
            }

            // 5. 综合评分 = 价值 / sqrt(路径长度) - 风险
            const score = (baseScore / Math.sqrt(pathLength + 1)) - risk;

            return {
                food,
                score,
                path,
                risk,
                isSafe,
                accessibleSpace,
                pathLength
            };
        }

        // ==================== REGION: 空间时间窗口管理 ====================

        // 计算空间时间窗口 - 返回每个格子何时会空出来
        function calculateSpaceTimeWindow(tileCount) {
            const timeWindow = new Array(tileCount).fill(null).map(() => new Array(tileCount).fill(0));

            // 蛇身第i段会在 (蛇长 - i) 步后空出
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const freeTime = snake.length - i;
                if (segment.x >= 0 && segment.x < tileCount && segment.y >= 0 && segment.y < tileCount) {
                    timeWindow[segment.y][segment.x] = freeTime;
                }
            }

            return timeWindow;
        }

        // 带时间窗口的洪水填充
        function countAccessibleSpaceWithTimeWindow(startX, startY, tileCount, maxSteps = 50) {
            const timeWindow = calculateSpaceTimeWindow(tileCount);
            const visited = new Set();
            const queue = [{ x: startX, y: startY, steps: 0 }];
            visited.add(`${startX},${startY}`);
            let count = 0;
            const maxCount = 400;

            while (queue.length > 0 && count < maxCount) {
                const { x, y, steps } = queue.shift();
                count++;

                const neighbors = [
                    { x: x + 1, y: y },
                    { x: x - 1, y: y },
                    { x: x, y: y + 1 },
                    { x: x, y: y - 1 }
                ];

                for (let n of neighbors) {
                    if (n.x < 0 || n.x >= tileCount || n.y < 0 || n.y >= tileCount) continue;

                    const key = `${n.x},${n.y}`;
                    if (visited.has(key)) continue;

                    const newSteps = steps + 1;
                    if (newSteps > maxSteps) continue;

                    // 检查该位置在到达时是否已经空出来
                    const freeTime = timeWindow[n.y][n.x];
                    if (freeTime > newSteps) continue; // 到达时还没空出来

                    visited.add(key);
                    queue.push({ x: n.x, y: n.y, steps: newSteps });
                }
            }

            return count;
        }

        // 检查路径是否会进入时间陷阱
        function isTimeTrap(path, tileCount) {
            if (!path || path.length < 2) return false;

            const timeWindow = calculateSpaceTimeWindow(tileCount);
            const lastPos = path[path.length - 1];

            // 检查吃完食物后的逃生路径
            const escapeDirs = [
                { x: 0, y: -1 }, { x: 0, y: 1 },
                { x: -1, y: 0 }, { x: 1, y: 0 }
            ];

            let hasEscape = false;
            for (let dir of escapeDirs) {
                const newX = lastPos.x + dir.x;
                const newY = lastPos.y + dir.y;

                if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;

                // 检查该方向在吃完后是否可用
                const freeTime = timeWindow[newY][newX];
                if (freeTime <= path.length + 1) {
                    hasEscape = true;
                    break;
                }
            }

            return !hasEscape;
        }

        // ==================== REGION: 前向安全检查 ====================

        const FORWARD_CHECKING = {
            DEPTH: 3,
            MIN_ESCAPE_PATHS: 2
        };

        // 执行深度前向检查
        function performForwardChecking(path) {
            if (!path || path.length === 0) {
                return { isSafe: false, escapePaths: 0 };
            }

            const { tileCount } = getGameSettings();
            const foodPos = path[path.length - 1];

            // 模拟吃完食物后的蛇状态
            const simulatedSnake = [
                { x: foodPos.x, y: foodPos.y },
                ...snake.map(s => ({ ...s }))
            ];

            // 深度检查
            let currentHead = { x: foodPos.x, y: foodPos.y };

            for (let depth = 1; depth <= FORWARD_CHECKING.DEPTH; depth++) {
                // 模拟蛇身移动（尾巴后退，头部在currentHead）
                const simulatedSnakeAtDepth = simulatedSnake.slice(0, simulatedSnake.length - depth);
                simulatedSnakeAtDepth[0] = { ...currentHead };

                // 计算从当前位置的逃生路径数
                const escapePaths = countEscapePathsAtDepth(currentHead, tileCount, simulatedSnakeAtDepth, depth);

                if (escapePaths < FORWARD_CHECKING.MIN_ESCAPE_PATHS) {
                    return { isSafe: false, escapePaths };
                }

                // 尝试移动到最佳相邻位置进行下一轮检查
                const nextPos = findBestAdjacentPosition(currentHead, tileCount, simulatedSnakeAtDepth, depth);
                if (!nextPos) {
                    return { isSafe: false, escapePaths: 0 };
                }
                currentHead = nextPos;
            }

            return { isSafe: true, escapePaths: FORWARD_CHECKING.MIN_ESCAPE_PATHS };
        }

        // 在指定深度计算逃生路径数
        function countEscapePathsAtDepth(head, tileCount, simulatedSnake, depth) {
            const directions = [
                { x: 0, y: -1 }, { x: 0, y: 1 },
                { x: -1, y: 0 }, { x: 1, y: 0 }
            ];

            let escapePaths = 0;
            const obstacleSet = new Set();

            // 构建障碍物集合
            for (let segment of simulatedSnake) {
                obstacleSet.add(`${segment.x},${segment.y}`);
            }

            for (let dir of directions) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;

                if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;
                if (obstacleSet.has(`${newX},${newY}`)) continue;

                // 检查从该位置能否到达尾巴
                const canReachTail = canReachTailFromPosition(newX, newY, simulatedSnake, tileCount);
                if (canReachTail) {
                    escapePaths++;
                }
            }

            return escapePaths;
        }

        // 从指定位置能否到达尾巴
        function canReachTailFromPosition(startX, startY, simulatedSnake, tileCount) {
            const tail = simulatedSnake[simulatedSnake.length - 1];
            if (!tail) return false;

            const queue = [{ x: startX, y: startY }];
            const visited = new Set();
            visited.add(`${startX},${startY}`);

            const obstacleSet = new Set();
            for (let segment of simulatedSnake) {
                obstacleSet.add(`${segment.x},${segment.y}`);
            }
            // 起点和尾巴不作为障碍物
            obstacleSet.delete(`${startX},${startY}`);
            obstacleSet.delete(`${tail.x},${tail.y}`);

            while (queue.length > 0) {
                const { x, y } = queue.shift();

                if (x === tail.x && y === tail.y) {
                    return true;
                }

                const directions = [
                    { x: 0, y: -1 }, { x: 0, y: 1 },
                    { x: -1, y: 0 }, { x: 1, y: 0 }
                ];

                for (let dir of directions) {
                    const newX = x + dir.x;
                    const newY = y + dir.y;
                    const key = `${newX},${newY}`;

                    if (visited.has(key)) continue;
                    if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;
                    if (obstacleSet.has(key)) continue;

                    visited.add(key);
                    queue.push({ x: newX, y: newY });
                }
            }

            return false;
        }

        // 寻找最佳相邻位置
        function findBestAdjacentPosition(head, tileCount, simulatedSnake, depth) {
            const directions = [
                { x: 0, y: -1, name: 'up' },
                { x: 0, y: 1, name: 'down' },
                { x: -1, y: 0, name: 'left' },
                { x: 1, y: 0, name: 'right' }
            ];

            let bestPos = null;
            let bestScore = -Infinity;
            const obstacleSet = new Set();

            for (let segment of simulatedSnake) {
                obstacleSet.add(`${segment.x},${segment.y}`);
            }

            for (let dir of directions) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;

                if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) continue;
                if (obstacleSet.has(`${newX},${newY}`)) continue;

                // 评分：优先选择空间大、离尾巴近的位置
                let score = 0;

                // 可访问空间
                const space = countAccessibleSpaceSimulated(newX, newY, tileCount, simulatedSnake);
                score += space;

                // 离尾巴的距离（越近越好，保证有退路）
                const tail = simulatedSnake[simulatedSnake.length - 1];
                if (tail) {
                    const distToTail = Math.abs(newX - tail.x) + Math.abs(newY - tail.y);
                    score -= distToTail * 2;
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestPos = { x: newX, y: newY };
                }
            }

            return bestPos;
        }

        // 模拟状态下的可访问空间计算
        function countAccessibleSpaceSimulated(startX, startY, tileCount, simulatedSnake) {
            const visited = new Set();
            const queue = [{ x: startX, y: startY }];
            visited.add(`${startX},${startY}`);
            let count = 0;
            const maxCount = 200;

            const obstacleSet = new Set();
            for (let segment of simulatedSnake) {
                obstacleSet.add(`${segment.x},${segment.y}`);
            }

            while (queue.length > 0 && count < maxCount) {
                const { x, y } = queue.shift();
                count++;

                const neighbors = [
                    { x: x + 1, y: y },
                    { x: x - 1, y: y },
                    { x: x, y: y + 1 },
                    { x: x, y: y - 1 }
                ];

                for (let n of neighbors) {
                    if (n.x < 0 || n.x >= tileCount || n.y < 0 || n.y >= tileCount) continue;

                    const key = `${n.x},${n.y}`;
                    if (visited.has(key)) continue;
                    if (obstacleSet.has(key)) continue;

                    visited.add(key);
                    queue.push(n);
                }
            }

            return count;
        }

        // ==================== REGION: 跟随尾巴策略 ====================

        // 改进的跟随尾巴策略
        function makeTailFollowingMove() {
            const head = snake[0];
            const { tileCount } = getGameSettings();

            // 获取所有安全移动
            const currentDir = direction;
            const directions = [
                { x: 0, y: -1 },
                { x: 0, y: 1 },
                { x: -1, y: 0 },
                { x: 1, y: 0 }
            ].filter(dir => {
                if (currentDir.x !== 0 || currentDir.y !== 0) {
                    if (dir.x === -currentDir.x && dir.y === -currentDir.y) {
                        return false;
                    }
                }
                return true;
            });

            let validMoves = [];

            for (let dir of directions) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;

                if (isSafeMove(newX, newY, true)) {
                    validMoves.push({ x: dir.x, y: dir.y, newX, newY });
                }
            }

            if (validMoves.length === 0) return null;

            let bestMove = null;
            let bestScore = -Infinity;

            for (let move of validMoves) {
                let score = 0;

                // 计算带时间窗口的可访问空间
                const space = countAccessibleSpaceWithTimeWindow(move.newX, move.newY, tileCount, 30);
                score += space * 3;

                // 寻找通往尾巴的路径
                const pathToTail = findPathToTailImproved(move.newX, move.newY);
                if (pathToTail) {
                    score += 100; // 能找到路径的奖励
                    // 路径越长越好（最大化移动空间）
                    score += pathToTail.length * 2;
                } else {
                    score -= 50; // 找不到路径的惩罚
                }

                // 墙壁距离惩罚
                const wallDist = Math.min(move.newX, move.newY, tileCount - 1 - move.newX, tileCount - 1 - move.newY);
                score += wallDist * 5;

                // 避免角落
                if (wallDist === 0 && (move.newX <= 1 || move.newX >= tileCount - 2) &&
                    (move.newY <= 1 || move.newY >= tileCount - 2)) {
                    score -= 30;
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }

            if (bestMove) {
                return { x: bestMove.x, y: bestMove.y };
            }

            return null;
        }

        // 寻找通往尾巴的改进路径（尝试找到最长安全路径）
        function findPathToTailImproved(startX, startY) {
            const tail = snake[snake.length - 1];

            // 先找最短路径
            const shortestPath = findPathToFood(startX, startY, tail.x, tail.y, true);
            if (!shortestPath) return null;

            // 基于最短路径，尝试找到更长的绕行路径
            // 这通过寻找相邻的空闲格子来延长路径
            const extendedPath = findExtendedPath(startX, startY, tail.x, tail.y, shortestPath);

            return extendedPath || shortestPath;
        }

        // 尝试延长路径
        function findExtendedPath(startX, startY, targetX, targetY, basePath) {
            const { tileCount } = getGameSettings();

            if (basePath.length < 2) return basePath;

            // 尝试在路径中插入绕行点
            // 对于路径中的每个转折点，看看是否可以绕远路
            let extendedPath = [...basePath];

            for (let i = 0; i < extendedPath.length - 1; i++) {
                const current = i === 0 ? { x: startX, y: startY } : extendedPath[i - 1];
                const next = extendedPath[i];

                // 检查是否可以绕行
                const detour = findDetour(current, next, tileCount);
                if (detour && detour.length > 0) {
                    // 插入绕行点
                    extendedPath.splice(i, 0, ...detour);
                    i += detour.length;
                }
            }

            return extendedPath;
        }

        // 寻找两点之间的绕行
        function findDetour(from, to, tileCount) {
            // 如果两点相邻，尝试找一个绕行点
            const dx = to.x - from.x;
            const dy = to.y - from.y;

            // 可能的绕行方向
            const detourDirs = [];

            if (dx !== 0) {
                // 水平移动，尝试上下绕行
                detourDirs.push({ x: from.x, y: from.y - 1 });
                detourDirs.push({ x: from.x, y: from.y + 1 });
                detourDirs.push({ x: to.x, y: to.y - 1 });
                detourDirs.push({ x: to.x, y: to.y + 1 });
            } else if (dy !== 0) {
                // 垂直移动，尝试左右绕行
                detourDirs.push({ x: from.x - 1, y: from.y });
                detourDirs.push({ x: from.x + 1, y: from.y });
                detourDirs.push({ x: to.x - 1, y: to.y });
                detourDirs.push({ x: to.x + 1, y: to.y });
            }

            for (let detour of detourDirs) {
                if (detour.x < 0 || detour.x >= tileCount || detour.y < 0 || detour.y >= tileCount) continue;
                if (!isSafeMove(detour.x, detour.y, true)) continue;

                // 检查从绕行点能否到达目标
                const pathFromDetour = findPathToFood(detour.x, detour.y, to.x, to.y, true);
                if (pathFromDetour) {
                    return [detour];
                }
            }

            return null;
        }

        // 备用策略
        function makeFallbackMove() {
            const head = snake[0];
            const currentDir = direction;

            const directions = [
                { x: 0, y: -1 },
                { x: 0, y: 1 },
                { x: -1, y: 0 },
                { x: 1, y: 0 }
            ].filter(dir => {
                if (currentDir.x !== 0 || currentDir.y !== 0) {
                    if (dir.x === -currentDir.x && dir.y === -currentDir.y) {
                        return false;
                    }
                }
                return true;
            });

            for (let dir of directions) {
                const newX = head.x + dir.x;
                const newY = head.y + dir.y;

                if (isSafeMove(newX, newY, false)) {
                    return { x: dir.x, y: dir.y };
                }
            }

            return currentDir;
        }

        // Firework types
        function createExplosionFirework(x, y, color, particleCount = 30) {
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;

                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 80 + Math.random() * 60;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.boxShadow = `0 0 10px ${color}`;
                particle.style.width = '6px';
                particle.style.height = '6px';

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        function createRingFirework(x, y, color, rings = 3) {
            for (let ring = 0; ring < rings; ring++) {
                const particleCount = 20;
                const radius = 60 + ring * 40;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = (4 - ring) + 'px';
                    particle.style.height = (4 - ring) + 'px';

                    const angle = (Math.PI * 2 * i) / particleCount;
                    const tx = Math.cos(angle) * radius;
                    const ty = Math.sin(angle) * radius;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 8px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }

        function createSpiralFirework(x, y, color, arms = 4) {
            for (let arm = 0; arm < arms; arm++) {
                const particlesPerArm = 10;
                const baseAngle = (Math.PI * 2 * arm) / arms;

                for (let i = 0; i < particlesPerArm; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = '5px';
                    particle.style.height = '5px';

                    const progress = i / particlesPerArm;
                    const angle = baseAngle + progress * Math.PI * 4;
                    const velocity = 50 + progress * 80;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 10px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1200);
                }
            }
        }

        function createStarFirework(x, y, color) {
            const starPoints = 8;
            const particleCount = starPoints * 4;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;
                particle.style.width = '7px';
                particle.style.height = '7px';

                const point = Math.floor(i / 4);
                const position = i % 4;
                const angle = (Math.PI * 2 * point) / starPoints;
                const velocity = 40 + position * 30;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.boxShadow = `0 0 12px ${color}`;

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        function createWaterfallFirework(x, y, color) {
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = color;
                    particle.style.width = '4px';
                    particle.style.height = '4px';

                    const angle = (Math.random() - 0.5) * Math.PI / 2;
                    const velocity = 50 + Math.random() * 60;
                    const gravity = -Math.random() * 30;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity + gravity;

                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.style.boxShadow = `0 0 8px ${color}`;

                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 1500);
                }, i * 20);
            }
        }

        // Trophy and flower spray animation for high scores
        const flowerEmojis = ['🌸', '🌺', '🌻', '🌷', '🌼', '💐', '🌹'];

        function createTrophyAnimation(finalScore) {
            // 只在分数 > 100 时显示
            if (finalScore <= 100) return;

            // 获取游戏结束弹窗的位置
            const overlayContent = document.querySelector('.game-overlay .overlay-content');
            if (!overlayContent) return;

            const rect = overlayContent.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // 创建奖杯容器
            const trophyContainer = document.createElement('div');
            trophyContainer.className = 'trophy-container';
            trophyContainer.style.left = (centerX - 32) + 'px';
            trophyContainer.style.top = (centerY - 50) + 'px';

            // 创建奖杯emoji
            const trophy = document.createElement('div');
            trophy.className = 'trophy-emoji';
            trophy.textContent = '🏆';

            trophyContainer.appendChild(trophy);
            document.body.appendChild(trophyContainer);

            // 延迟一点后喷射花朵
            setTimeout(() => {
                createFlowerSpray(centerX, centerY);
            }, 400);

            // 2秒后移除奖杯
            setTimeout(() => {
                if (trophyContainer.parentNode) {
                    trophyContainer.remove();
                }
            }, 2500);
        }

        function createFlowerSpray(x, y) {
            const flowerCount = 24 + Math.floor(Math.random() * 6); // 24-30 朵花

            for (let i = 0; i < flowerCount; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';

                    // 随机花朵类型
                    const randomFlower = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                    flower.textContent = randomFlower;

                    // 初始位置
                    flower.style.left = x + 'px';
                    flower.style.top = y + 'px';

                    // 随机角度和速度 (向外喷射)
                    const angle = (Math.PI * 2 * i) / flowerCount + (Math.random() - 0.5) * 0.5;
                    const velocity = 60 + Math.random() * 60; // 60-120px
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity + 50; // 加上重力效果

                    // 随机旋转
                    const rotation = Math.random() * 360;

                    flower.style.setProperty('--tx', tx + 'px');
                    flower.style.setProperty('--ty', ty + 'px');
                    flower.style.setProperty('--rot', rotation + 'deg');

                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 1500);
                }, i * 30);
            }
        }

        function createParticles(eatenFood) {
            const { gridSize } = getGameSettings();
            const canvas = document.getElementById('gameCanvas');
            const canvasRect = canvas.getBoundingClientRect();

            // Calculate the screen position of the eaten food
            const foodScreenPos = {
                x: canvasRect.left + (eatenFood.x + 0.5) * gridSize,
                y: canvasRect.top + (eatenFood.y + 0.5) * gridSize
            };

            // Calculate a position above the canvas for the firework to start
            // This ensures firework is visible outside the game area
            const fireworkPos = {
                x: foodScreenPos.x,
                y: canvasRect.top - 100 // Start above the canvas
            };

            // Select a random firework type based on fruit points
            const fireworkTypes = ['explosion', 'ring', 'spiral', 'star', 'waterfall'];
            const chosenType = fireworkTypes[Math.floor(Math.random() * fireworkTypes.length)];

            // Different particle counts based on fruit value
            let particleMultiplier = 1;
            if (eatenFood.points >= 8) particleMultiplier = 2;
            else if (eatenFood.points >= 5) particleMultiplier = 1.5;

            // Create canvas glow effect first (this stays in canvas)
            ctx.save();
            ctx.globalAlpha = 0.2;

            // Create radial gradient for fruit glow
            const gradient = ctx.createRadialGradient(
                eatenFood.x * gridSize + gridSize/2,
                eatenFood.y * gridSize + gridSize/2,
                0,
                eatenFood.x * gridSize + gridSize/2,
                eatenFood.y * gridSize + gridSize/2,
                gridSize * 3
            );
            gradient.addColorStop(0, eatenFood.color || '#FFB7B2');
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.fillRect(eatenFood.x * gridSize - gridSize * 2, eatenFood.y * gridSize - gridSize * 2, gridSize * 5, gridSize * 5);
            ctx.restore();

            // Execute chosen firework type at screen position (outside canvas)
            switch(chosenType) {
                case 'explosion':
                    createExplosionFirework(fireworkPos.x, fireworkPos.y, eatenFood.color || '#FFB7B2', Math.floor(30 * particleMultiplier));
                    break;
                case 'ring':
                    createRingFirework(fireworkPos.x, fireworkPos.y, eatenFood.color || '#FFDAC1', 2 + Math.floor(particleMultiplier));
                    break;
                case 'spiral':
                    createSpiralFirework(fireworkPos.x, fireworkPos.y, eatenFood.color || '#E2F0CB', Math.floor(3 * particleMultiplier));
                    break;
                case 'star':
                    createStarFirework(fireworkPos.x, fireworkPos.y, eatenFood.color || '#C7CEEA');
                    break;
                case 'waterfall':
                    createWaterfallFirework(fireworkPos.x, fireworkPos.y, eatenFood.color || '#FF9AA2');
                    break;
            }
        }

        // END REGION: 动画效果


        // ============================================================
        // REGION: UI 控制 (UI Control)
        // ============================================================
        // - 菜单控制
        // - 游戏模式切换
        // - 返回菜单
        // ============================================================

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            // Disable keyboard controls in AI mode
            if (isAIMode) return;

            if (!gameRunning && e.key !== 'Enter' && e.key !== ' ') return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) {
                        direction = {x: 0, y: -1};
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) {
                        direction = {x: 0, y: 1};
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) {
                        direction = {x: -1, y: 0};
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) {
                        direction = {x: 1, y: 0};
                    }
                    break;
                case 'Enter':
                case ' ':
                    if (!gameRunning) {
                        restartGame();
                    }
                    break;
            }
        });

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            // Disable touch controls in AI mode
            if (isAIMode) return;

            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            // Disable touch controls in AI mode
            if (isAIMode) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                if (dx > 0 && direction.x === 0) {
                    direction = {x: 1, y: 0};
                } else if (dx < 0 && direction.x === 0) {
                    direction = {x: -1, y: 0};
                }
            } else {
                // Vertical swipe
                if (dy > 0 && direction.y === 0) {
                    direction = {x: 0, y: 1};
                } else if (dy < 0 && direction.y === 0) {
                    direction = {x: 0, y: -1};
                }
            }
        }, { passive: false });

        // Direction button controls for mobile
        const dPadButtons = document.querySelectorAll('.d-btn');

        function handleDirectionButton(dir) {
            // Disable controls in AI mode
            if (isAIMode) return;

            switch(dir) {
                case 'up':
                    if (direction.y === 0) {
                        direction = {x: 0, y: -1};
                    }
                    break;
                case 'down':
                    if (direction.y === 0) {
                        direction = {x: 0, y: 1};
                    }
                    break;
                case 'left':
                    if (direction.x === 0) {
                        direction = {x: -1, y: 0};
                    }
                    break;
                case 'right':
                    if (direction.x === 0) {
                        direction = {x: 1, y: 0};
                    }
                    break;
            }
        }

        dPadButtons.forEach(btn => {
            // Touch events for mobile
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                const dir = btn.getAttribute('data-direction');
                handleDirectionButton(dir);
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            }, { passive: false });

            btn.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            }, { passive: false });

            // Mouse events for desktop testing
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                const dir = btn.getAttribute('data-direction');
                handleDirectionButton(dir);
            });

            btn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            });

            btn.addEventListener('mouseleave', (e) => {
                btn.classList.remove('active');
            });
        });

        // Prevent default touch behaviors on game canvas and controls
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#gameCanvas') || e.target.closest('.d-pad')) {
                e.preventDefault();
            }
        }, { passive: false });

        // END REGION: UI 控制


        // ============================================================
        // REGION: 初始化 (Initialization)
        // ============================================================
        // - 游戏从菜单开始
        // - 不自动启动游戏循环
        // - gameLoop() 在选择模式时调用
        // ============================================================

        // Game starts from menu, not automatically
        // gameLoop() is called when a mode is selected

        // END REGION: 初始化

    </script>
</body>
